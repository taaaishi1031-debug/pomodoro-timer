<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TimeBlock × Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #141414;
      --surface2:   #1c1c1c;
      --work:       #7d6e59;
      --work-dim:   #4a4035;
      --work-light: #a08f78;
      --break-ring: #2a52cc;
      --text:       #f0f0f0;
      --text-muted: #666;
      --text-dim:   #2e2e2e;
      --border:     #1a1a1a;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Shell: header / main / schedule ── */
    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: 36px 1fr 36px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
    }

    .app-title {
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .current-time {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* ── Main: timer centered ── */
    .main {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .timer-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .timer-container:active .timer-svg {
      transform: scale(0.975);
    }

    /*
      SVG size = fill the available height as much as possible.
      Available height = 100dvh - 36px header - 36px schedule bar = 100dvh - 72px
      Also cap by width so it stays circular on wider screens.
    */
    .timer-svg {
      width:  min(calc(100dvh - 80px), 92vw);
      height: min(calc(100dvh - 80px), 92vw);
      overflow: visible;
      transition: transform 0.12s ease;
    }

    .timer-track {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 5;
    }

    .timer-glow {
      fill: none;
      stroke: var(--work);
      stroke-width: 12;
      stroke-linecap: round;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
      opacity: 0.1;
      filter: blur(7px);
      transition: stroke 0.5s, stroke-dashoffset 0.9s ease;
    }

    .timer-ring {
      fill: none;
      stroke: var(--work);
      stroke-width: 5;
      stroke-linecap: round;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
      transition: stroke 0.5s, stroke-dashoffset 0.9s ease;
    }

    /* ── Timer center content ── */
    .timer-center {
      position: absolute;
      text-align: center;
      pointer-events: none;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /*
      Font size scales with SVG size.
      SVG width = min(100dvh - 80px, 92vw).
      Time takes ~22% of SVG size.
    */
    .timer-display {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      font-size: min(calc((100dvh - 80px) * 0.22), calc(92vw * 0.22), 96px);
    }

    .inner-block-name {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: var(--text-muted);
      margin-top: 0.5em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      /* cap width to roughly inner circle diameter */
      max-width: min(calc((100dvh - 80px) * 0.72), calc(92vw * 0.72));
      font-size: min(calc((100dvh - 80px) * 0.055), calc(92vw * 0.055), 18px);
    }

    /* ── Schedule bottom bar ── */
    .schedule-section {
      position: relative;
      border-top: 1px solid var(--border);
    }

    .schedule-toggle {
      width: 100%;
      height: 36px;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .schedule-toggle:hover { color: var(--text-muted); }

    .schedule-toggle .chevron {
      display: inline-block;
      font-style: normal;
      transition: transform 0.3s ease;
    }

    .schedule-toggle.open .chevron { transform: rotate(180deg); }

    .schedule-list {
      position: absolute;
      bottom: 36px;
      left: 0; right: 0;
      max-height: 0;
      overflow-y: auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overscroll-behavior: contain;
    }

    .schedule-list.open { max-height: 60dvh; }

    .schedule-item {
      display: flex;
      align-items: center;
      padding: 9px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
      transition: opacity 0.3s;
    }

    .schedule-item.current {
      background: linear-gradient(90deg, rgba(125,110,89,.09) 0%, transparent 70%);
    }

    .schedule-item.current::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      height: 55%; width: 2px;
      background: var(--work);
      border-radius: 1px;
    }

    .schedule-item.completed { opacity: 0.25; }
    .schedule-item.future    { opacity: 0.4; }

    .item-time {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      min-width: 68px;
      line-height: 1.8;
    }

    .item-name {
      flex: 1;
      font-size: 12px;
      padding: 0 12px;
    }

    .schedule-item.current .item-name { color: #a08f78; font-weight: 500; }

    .item-sets {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      min-width: 32px;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="app-title">TimeBlock &times; Pomodoro</div>
    <div class="current-time" id="currentTime">--:--</div>
  </div>

  <div class="main">
    <div class="timer-container" onclick="toggleTimer()">
      <svg class="timer-svg" viewBox="0 0 260 260">
        <circle class="timer-track" cx="130" cy="130" r="110"/>
        <circle class="timer-glow" id="timerGlow" cx="130" cy="130" r="110"
          stroke-dasharray="691.15" stroke-dashoffset="0"/>
        <circle class="timer-ring" id="timerRing" cx="130" cy="130" r="110"
          stroke-dasharray="691.15" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-center">
        <div class="timer-display"   id="timerDisplay">--:--</div>
        <div class="inner-block-name" id="innerBlockName"></div>
      </div>
    </div>
  </div>

  <div class="schedule-section">
    <button class="schedule-toggle" id="scheduleToggle" onclick="toggleSchedule()">
      <span>今日のスケジュール</span>
      <i class="chevron">&#9650;</i>
    </button>
    <div class="schedule-list" id="scheduleList"></div>
  </div>

</div>

<script>
const SCHEDULE = [
  { name: 'ジム・ゴルフ',          start: '06:00', end: '07:00', pomodoro: false },
  { name: 'Podcast作成・投稿',      start: '07:00', end: '08:00', pomodoro: true  },
  { name: 'プロジェクト業務①',     start: '08:00', end: '09:30', pomodoro: true  },
  { name: 'Learning English',       start: '09:30', end: '11:00', pomodoro: true  },
  { name: 'プロジェクト業務②',     start: '11:00', end: '12:30', pomodoro: true  },
  { name: '昼休憩',                start: '12:30', end: '13:30', pomodoro: false },
  { name: 'Learning Something',     start: '13:30', end: '15:00', pomodoro: true  },
  { name: 'プロジェクト業務③',     start: '15:00', end: '16:30', pomodoro: true  },
  { name: 'FiAt業務',              start: '16:30', end: '18:00', pomodoro: true  },
  { name: 'Additional Time',        start: '18:00', end: '19:30', pomodoro: true  },
  { name: 'Super Additional Time',  start: '19:30', end: '21:00', pomodoro: true  },
];

const WORK_SEC  = 25 * 60;
const BREAK_SEC = 5  * 60;
const R    = 110;
const CIRC = +(2 * Math.PI * R).toFixed(2); // 691.15

let S = {
  blockIdx:      -1,
  currentSet:    0,
  totalSets:     0,
  phase:        'work',
  timeRemaining: WORK_SEC,
  totalTime:     WORK_SEC,
  running:       false,
  blockComplete: false,
};

let ticker = null, audioCtx = null;

// ── Helpers ──
function toMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function nowMin() { const d = new Date(); return d.getHours()*60+d.getMinutes(); }
function pad2(n)  { return String(n).padStart(2,'0'); }
function fmt(sec) { return `${pad2(Math.floor(sec/60))}:${pad2(sec%60)}`; }
function getSets(b) { return b.pomodoro ? (toMin(b.end)-toMin(b.start))/30 : 0; }
function currentBlockIdx() {
  const now = nowMin();
  return SCHEDULE.findIndex(b => now >= toMin(b.start) && now < toMin(b.end));
}

// ── Audio ──
function actx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, delay, dur, vol=0.38) {
  const c=actx(), osc=c.createOscillator(), g=c.createGain();
  osc.connect(g); g.connect(c.destination);
  osc.type='sine'; osc.frequency.value=freq;
  const t=c.currentTime+delay;
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  osc.start(t); osc.stop(t+dur+0.05);
}
function soundWorkEnd()   { beep(880,0,0.35); beep(1108,0.4,0.35); }
function soundBreakEnd()  { beep(660,0,0.3);  beep(880,0.35,0.35); }
function soundBlockDone() {
  beep(523,0,0.25); beep(659,0.28,0.25);
  beep(784,0.56,0.25); beep(1047,0.84,0.5);
}

// ── Init ──
function initFreeRun() {
  S.blockIdx=-1; S.totalSets=0; S.currentSet=0;
  S.blockComplete=false; S.running=false;
  S.phase='work'; S.timeRemaining=WORK_SEC; S.totalTime=WORK_SEC;
  clearInterval(ticker); ticker=null;
}

function initBlock(idx) {
  const b=SCHEDULE[idx];
  S.blockIdx=idx; S.totalSets=getSets(b);
  S.currentSet=0; S.blockComplete=false; S.running=false;
  clearInterval(ticker); ticker=null;
  if (!b.pomodoro) {
    S.phase='countdown';
    S.timeRemaining=Math.max((toMin(b.end)-nowMin())*60,0);
    S.totalTime=(toMin(b.end)-toMin(b.start))*60;
  } else {
    S.phase='work'; S.timeRemaining=WORK_SEC; S.totalTime=WORK_SEC;
  }
}

// ── Timer ──
function toggleTimer() {
  if (S.blockComplete) return;
  actx();
  S.running ? pause() : play();
}

function play() {
  S.running=true; render();
  ticker=setInterval(tick,1000);
}

function pause() {
  S.running=false;
  clearInterval(ticker); ticker=null;
  render();
}

function tick() {
  S.timeRemaining=Math.max(0,S.timeRemaining-1);
  if (S.timeRemaining===0) onPhaseEnd(); else render();
}

function onPhaseEnd() {
  clearInterval(ticker); ticker=null; S.running=false;

  if (S.phase==='countdown') {
    S.blockComplete=true; soundBlockDone(); render(); return;
  }
  if (S.phase==='work') {
    soundWorkEnd();
    S.phase='break'; S.timeRemaining=BREAK_SEC; S.totalTime=BREAK_SEC;
    play(); return;
  }
  // break ended
  const next=S.currentSet+1;
  if (S.totalSets>0 && next>=S.totalSets) {
    S.blockComplete=true; S.currentSet=S.totalSets;
    soundBlockDone(); render();
  } else {
    soundBreakEnd();
    S.currentSet=next;
    S.phase='work'; S.timeRemaining=WORK_SEC; S.totalTime=WORK_SEC;
    play();
  }
}

// ── Render ──
function render() {
  // clock
  const d=new Date();
  document.getElementById('currentTime').textContent=
    `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;

  // ring
  const ring=document.getElementById('timerRing');
  const glow=document.getElementById('timerGlow');
  const disp=document.getElementById('timerDisplay');
  const name=document.getElementById('innerBlockName');

  // block name
  const blockName = S.blockIdx>=0 ? SCHEDULE[S.blockIdx].name : 'フリーラン';
  name.textContent = S.blockComplete ? blockName : blockName;

  if (S.blockComplete) {
    ring.style.strokeDashoffset=glow.style.strokeDashoffset=CIRC;
    ring.style.stroke=glow.style.stroke='var(--work-dim)';
    disp.textContent='00:00';
    name.style.color='var(--work-dim)';
  } else {
    const progress=S.totalTime>0 ? S.timeRemaining/S.totalTime : 1;
    const offset=+(CIRC*(1-progress)).toFixed(2);
    ring.style.strokeDashoffset=glow.style.strokeDashoffset=offset;
    disp.textContent=fmt(S.timeRemaining);

    if (S.phase==='break') {
      ring.style.stroke=glow.style.stroke='var(--break-ring)';
      name.style.color='#5577e8';
    } else if (S.phase==='countdown') {
      ring.style.stroke=glow.style.stroke='#3a3a3a';
      name.style.color='var(--text-muted)';
    } else {
      ring.style.stroke=glow.style.stroke='var(--work)';
      name.style.color='var(--text-muted)';
    }
  }

  // schedule list
  const list=document.getElementById('scheduleList');
  const now=nowMin();
  list.innerHTML='';
  SCHEDULE.forEach((b,i) => {
    const item=document.createElement('div');
    item.className='schedule-item';
    if      (i===S.blockIdx)      item.classList.add('current');
    else if (now>=toMin(b.end))   item.classList.add('completed');
    else                          item.classList.add('future');
    const badge=b.pomodoro ? `${getSets(b)}set` : '—';
    item.innerHTML=`
      <div class="item-time">${b.start}<br>${b.end}</div>
      <div class="item-name">${b.name}</div>
      <div class="item-sets">${badge}</div>
    `;
    list.appendChild(item);
  });
}

function toggleSchedule() {
  document.getElementById('scheduleList').classList.toggle('open');
  document.getElementById('scheduleToggle').classList.toggle('open');
}

// ── Clock loop ──
function clockTick() {
  const d=new Date();
  document.getElementById('currentTime').textContent=
    `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  const newIdx=currentBlockIdx();
  if (newIdx!==S.blockIdx && !S.running) {
    if (newIdx>=0) initBlock(newIdx); else initFreeRun();
    render();
  }
}

// ── Boot ──
(function init() {
  const idx=currentBlockIdx();
  if (idx>=0) initBlock(idx); else initFreeRun();
  render();
  setInterval(clockTick,5000);
})();
</script>
</body>
</html>

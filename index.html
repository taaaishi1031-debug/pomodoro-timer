<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TimeBlock × Pomodoro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #141414;
      --surface2:   #1c1c1c;
      --work:       #7d6e59;
      --work-dim:   #4a4035;
      --work-light: #a08f78;
      --break-ring: #2a52cc;
      --text:       #f0f0f0;
      --text-muted: #666;
      --text-dim:   #2e2e2e;
      --border:     #1a1a1a;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      height: 100dvh;
      display: grid;
      grid-template-rows: 36px 1fr 36px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
    }

    .app-title {
      font-size: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .current-time {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* ── Main ── */
    .main {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .timer-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    /*
      SVG fills available height.
      Available = 100dvh - 36px header - 36px schedule = 100dvh - 72px
      Also capped by width for wide/portrait screens.
    */
    .timer-svg {
      width:  min(calc(100dvh - 80px), 92vw);
      height: min(calc(100dvh - 80px), 92vw);
      overflow: visible;
    }

    .timer-track {
      fill: none;
      stroke: var(--surface2);
      stroke-width: 5;
    }

    .timer-glow {
      fill: none;
      stroke: var(--work);
      stroke-width: 12;
      stroke-linecap: round;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
      opacity: 0.1;
      filter: blur(7px);
      transition: stroke 0.6s;
      /* no transition on dashoffset — updates every second so transition looks wrong */
    }

    .timer-ring {
      fill: none;
      stroke: var(--work);
      stroke-width: 5;
      stroke-linecap: round;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
      transition: stroke 0.6s;
    }

    /* ── Center text ── */
    .timer-center {
      position: absolute;
      text-align: center;
      pointer-events: none;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .timer-display {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      font-size: min(calc((100dvh - 80px) * 0.22), calc(92vw * 0.22), 96px);
    }

    .inner-block-name {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: var(--text-muted);
      margin-top: 0.5em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(calc((100dvh - 80px) * 0.72), calc(92vw * 0.72));
      font-size: min(calc((100dvh - 80px) * 0.055), calc(92vw * 0.055), 18px);
      transition: color 0.6s;
    }

    /* ── Schedule bottom bar ── */
    .schedule-section {
      position: relative;
      border-top: 1px solid var(--border);
    }

    .schedule-toggle {
      width: 100%;
      height: 36px;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .schedule-toggle:hover { color: var(--text-muted); }

    .schedule-toggle .chevron {
      display: inline-block;
      font-style: normal;
      transition: transform 0.3s ease;
    }

    .schedule-toggle.open .chevron { transform: rotate(180deg); }

    .schedule-list {
      position: absolute;
      bottom: 36px;
      left: 0; right: 0;
      max-height: 0;
      overflow-y: auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overscroll-behavior: contain;
    }

    .schedule-list.open { max-height: 60dvh; }

    .schedule-item {
      display: flex;
      align-items: center;
      padding: 9px 20px;
      border-bottom: 1px solid var(--border);
      position: relative;
      transition: opacity 0.3s;
    }

    .schedule-item.current {
      background: linear-gradient(90deg, rgba(125,110,89,.09) 0%, transparent 70%);
    }

    .schedule-item.current::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      height: 55%; width: 2px;
      background: var(--work);
      border-radius: 1px;
    }

    .schedule-item.completed { opacity: 0.25; }
    .schedule-item.future    { opacity: 0.4; }

    .item-time {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      min-width: 68px;
      line-height: 1.8;
    }

    .item-name {
      flex: 1;
      font-size: 12px;
      padding: 0 12px;
    }

    .schedule-item.current .item-name { color: #a08f78; font-weight: 500; }

    .item-sets {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--text-dim);
      min-width: 32px;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="app-title">TimeBlock &times; Pomodoro</div>
    <div class="current-time" id="currentTime">--:--</div>
  </div>

  <div class="main">
    <div class="timer-container">
      <svg class="timer-svg" viewBox="0 0 260 260">
        <circle class="timer-track" cx="130" cy="130" r="110"/>
        <circle class="timer-glow" id="timerGlow" cx="130" cy="130" r="110"
          stroke-dasharray="691.15" stroke-dashoffset="0"/>
        <circle class="timer-ring" id="timerRing" cx="130" cy="130" r="110"
          stroke-dasharray="691.15" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-center">
        <div class="timer-display"    id="timerDisplay">--:--</div>
        <div class="inner-block-name" id="innerBlockName"></div>
      </div>
    </div>
  </div>

  <div class="schedule-section">
    <button class="schedule-toggle" id="scheduleToggle" onclick="toggleSchedule()">
      <span>今日のスケジュール</span>
      <i class="chevron">&#9650;</i>
    </button>
    <div class="schedule-list" id="scheduleList"></div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════════
// Schedule
// ═══════════════════════════════════════════════
const SCHEDULE = [
  { name: 'ジム・ゴルフ',          start: '06:00', end: '07:00', pomodoro: false },
  { name: 'Podcast作成・投稿',      start: '07:00', end: '08:00', pomodoro: true  },
  { name: 'プロジェクト業務①',     start: '08:00', end: '09:30', pomodoro: true  },
  { name: 'Learning English',       start: '09:30', end: '11:00', pomodoro: true  },
  { name: 'プロジェクト業務②',     start: '11:00', end: '12:30', pomodoro: true  },
  { name: '昼休憩',                start: '12:30', end: '13:30', pomodoro: false },
  { name: 'Learning Something',     start: '13:30', end: '15:00', pomodoro: true  },
  { name: 'プロジェクト業務③',     start: '15:00', end: '16:30', pomodoro: true  },
  { name: 'FiAt業務',              start: '16:30', end: '18:00', pomodoro: true  },
  { name: 'Additional Time',        start: '18:00', end: '19:30', pomodoro: true  },
  { name: 'Super Additional Time',  start: '19:30', end: '21:00', pomodoro: true  },
];

const WORK_SEC  = 25 * 60;  // 1500
const BREAK_SEC = 5  * 60;  // 300
const SET_SEC   = WORK_SEC + BREAK_SEC; // 1800 (30 min)
const R    = 110;
const CIRC = +(2 * Math.PI * R).toFixed(2); // 691.15

// ── Helpers ──
function toMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }
function pad2(n)  { return String(n).padStart(2, '0'); }
function fmt(sec) { return `${pad2(Math.floor(sec / 60))}:${pad2(sec % 60)}`; }
function getSets(b) {
  return b.pomodoro ? (toMin(b.end) - toMin(b.start)) / 30 : 0;
}
function nowSec() {
  const d = new Date();
  return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
}
function currentBlockIdx() {
  const now = Math.floor(nowSec() / 60);
  return SCHEDULE.findIndex(b => now >= toMin(b.start) && now < toMin(b.end));
}

// ═══════════════════════════════════════════════
// Core: compute current timer state from real time
// ═══════════════════════════════════════════════
function computeState() {
  const secs     = nowSec();
  const blockIdx = currentBlockIdx();

  if (blockIdx >= 0) {
    const b = SCHEDULE[blockIdx];

    // Non-pomodoro block: simple countdown to block end
    if (!b.pomodoro) {
      const endSec = toMin(b.end) * 60;
      return {
        phase:         'countdown',
        timeRemaining: endSec - secs,
        totalTime:     (toMin(b.end) - toMin(b.start)) * 60,
        blockName:     b.name,
        blockIdx,
      };
    }

    // Pomodoro block: calculate position within cycle
    const blockStartSec = toMin(b.start) * 60;
    const elapsed       = secs - blockStartSec;          // seconds since block start
    const totalSets     = getSets(b);
    const setIdx        = Math.min(Math.floor(elapsed / SET_SEC), totalSets - 1);
    const posInSet      = elapsed - setIdx * SET_SEC;    // 0..1799

    if (posInSet < WORK_SEC) {
      return {
        phase:         'work',
        timeRemaining: WORK_SEC - posInSet,
        totalTime:     WORK_SEC,
        blockName:     b.name,
        blockIdx,
        currentSet:    setIdx,
        totalSets,
      };
    } else {
      return {
        phase:         'break',
        timeRemaining: SET_SEC - posInSet,   // = BREAK_SEC - (posInSet - WORK_SEC)
        totalTime:     BREAK_SEC,
        blockName:     b.name,
        blockIdx,
        currentSet:    setIdx,
        totalSets,
      };
    }
  }

  // Outside schedule: free-run aligned to absolute clock (30-min cycle from midnight)
  const cyclePos = secs % SET_SEC;
  if (cyclePos < WORK_SEC) {
    return {
      phase:         'work',
      timeRemaining: WORK_SEC - cyclePos,
      totalTime:     WORK_SEC,
      blockName:     'フリーラン',
      blockIdx:      -1,
    };
  } else {
    return {
      phase:         'break',
      timeRemaining: SET_SEC - cyclePos,
      totalTime:     BREAK_SEC,
      blockName:     'フリーラン',
      blockIdx:      -1,
    };
  }
}

// ═══════════════════════════════════════════════
// Audio
// ═══════════════════════════════════════════════
let audioCtx = null;

function actx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, delay, dur, vol = 0.38) {
  const c = actx(), osc = c.createOscillator(), g = c.createGain();
  osc.connect(g); g.connect(c.destination);
  osc.type = 'sine'; osc.frequency.value = freq;
  const t = c.currentTime + delay;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.05);
}

function soundWorkEnd()  { beep(880, 0, 0.35); beep(1108, 0.4, 0.35); }
function soundBreakEnd() { beep(660, 0, 0.3);  beep(880, 0.35, 0.35); }

// ═══════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════
function render(st) {
  // Clock
  const d = new Date();
  document.getElementById('currentTime').textContent =
    `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;

  // Ring
  const ring    = document.getElementById('timerRing');
  const glow    = document.getElementById('timerGlow');
  const disp    = document.getElementById('timerDisplay');
  const nameEl  = document.getElementById('innerBlockName');

  const progress = st.totalTime > 0 ? st.timeRemaining / st.totalTime : 1;
  const offset   = +(CIRC * (1 - progress)).toFixed(2);
  ring.style.strokeDashoffset = offset;
  glow.style.strokeDashoffset = offset;

  disp.textContent  = fmt(st.timeRemaining);
  nameEl.textContent = st.blockName;

  if (st.phase === 'break') {
    ring.style.stroke = glow.style.stroke = 'var(--break-ring)';
    nameEl.style.color = '#5577e8';
  } else if (st.phase === 'countdown') {
    ring.style.stroke = glow.style.stroke = '#383838';
    nameEl.style.color = 'var(--text-muted)';
  } else {
    ring.style.stroke = glow.style.stroke = 'var(--work)';
    nameEl.style.color = 'var(--text-muted)';
  }

  // Schedule list
  const list = document.getElementById('scheduleList');
  const nowM = Math.floor(nowSec() / 60);
  list.innerHTML = '';
  SCHEDULE.forEach((b, i) => {
    const item = document.createElement('div');
    item.className = 'schedule-item';
    if      (i === st.blockIdx)      item.classList.add('current');
    else if (nowM >= toMin(b.end))   item.classList.add('completed');
    else                             item.classList.add('future');
    const badge = b.pomodoro ? `${getSets(b)}set` : '—';
    item.innerHTML = `
      <div class="item-time">${b.start}<br>${b.end}</div>
      <div class="item-name">${b.name}</div>
      <div class="item-sets">${badge}</div>
    `;
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════════
// Tick — runs every second, derives state from clock
// ═══════════════════════════════════════════════
let prevPhase     = null;
let prevBlockIdx  = null;
let audioUnlocked = false;

function tick() {
  const st = computeState();

  // Sound on phase transitions (only after first render to avoid false triggers)
  if (prevPhase !== null && audioUnlocked) {
    if (prevPhase === 'work'  && st.phase === 'break') soundWorkEnd();
    if (prevPhase === 'break' && st.phase === 'work')  soundBreakEnd();
  }

  prevPhase    = st.phase;
  prevBlockIdx = st.blockIdx;

  render(st);
}

// Unlock AudioContext on first user interaction
function unlockAudio() {
  actx();
  audioUnlocked = true;
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}

document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click',      unlockAudio, { once: true });

// ═══════════════════════════════════════════════
// Schedule toggle
// ═══════════════════════════════════════════════
function toggleSchedule() {
  document.getElementById('scheduleList').classList.toggle('open');
  document.getElementById('scheduleToggle').classList.toggle('open');
}

// ═══════════════════════════════════════════════
// Boot
// ═══════════════════════════════════════════════
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
